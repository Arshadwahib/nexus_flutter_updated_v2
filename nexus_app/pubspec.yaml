name: nexus
description: Nexus - A next-gen social media platform combining Twitter & Instagram features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend - Supabase (Free tier: 500MB DB, 1GB storage, 50k MAU)
  supabase_flutter: ^2.3.0

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Navigation
  go_router: ^13.0.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  blur: ^3.1.0
  glass_kit: ^3.0.1
  
  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.3
  chewie: ^1.7.4
  photo_view: ^0.14.0
  
  # Chat / Real-time
  timeago: ^3.6.1
  intl: ^0.19.0
  emoji_picker_flutter: ^2.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utils
  uuid: ^4.3.3
  http: ^1.2.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.2
  crypto: ^3.0.3

  # Forms
  flutter_form_builder: ^9.2.1

  # Animations
  rive: ^0.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
